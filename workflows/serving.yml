apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate

metadata:
  name: qwen3guard-gen-4b-vllm
  annotations:
    scenarios.ai.sap.com/description: "Qwen3 Guard-4B vLLM Server"
    scenarios.ai.sap.com/name: "qwen3guard-4b"
    executables.ai.sap.com/description: "Qwen3 Guard-4B vLLM inference"
    executables.ai.sap.com/name: "qwen3guard-4b"
  labels:
    scenarios.ai.sap.com/id: "qwen3guard-4b"
    ai.sap.com/version: "1.0.0"

spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"

    metadata:
      annotations: |
        autoscaling.knative.dev/metric: concurrency
        autoscaling.knative.dev/target: "1"
        autoscaling.knative.dev/targetBurstCapacity: "0"
      labels: |
        ai.sap.com/resourcePlan: infer.l

    spec: |
      predictor:
        imagePullSecrets:
          - name: docker-registry-secret

        minReplicas: 1
        maxReplicas: 1

        containers:
          - name: kserve-container
            image: docker.io/lokeshr11/qwen3guard-gen-4b:latest

            ports:
              - containerPort: 8000
                protocol: TCP
